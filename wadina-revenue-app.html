<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap');
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #EFEAE0;
    font-family: 'Tajawal', 'Segoe UI', sans-serif;
    color: #2B2620;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 24px 16px 60px; }
  .ledger-title { font-family: 'Amiri', Georgia, serif; }
  .num { font-variant-numeric: tabular-nums; }
  input, select, button { font-family: 'Tajawal', sans-serif; }
  input::placeholder { color: #9c9184; }

  .header { text-align: center; margin-bottom: 20px; }
  .logo { width: 92px; height: 92px; border-radius: 50%; object-fit: cover;
          box-shadow: 0 3px 14px rgba(43,38,32,0.15); margin-bottom: 8px; }
  .header h1 { font-size: 24px; margin: 0 0 2px; letter-spacing: 0.5px; }
  .subtitle { font-size: 12.5px; color: #7a9e8f; letter-spacing: 1.5px; }
  .rule { height: 2px; width: 90px; background: #5FA88C; margin: 10px auto 0; border-radius: 2px; }

  .tabs { display: flex; flex-wrap: wrap; gap: 6px; background: #e6ddc9; padding: 5px; border-radius: 10px; margin-bottom: 22px; }
  .tab-btn {
    flex: 1 1 30%; min-width: 100px; display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 4px; border-radius: 7px; border: none; cursor: pointer;
    font-size: 12.5px; font-weight: 700; background: transparent; color: #6b6152;
    transition: all 0.15s ease;
  }
  .tab-btn.active { background: #2B2620; color: #EFEAE0; }

  .card { background: #FBF8F2; border: 1px solid #DCD3C2; border-radius: 12px; padding: 18px; margin-bottom: 22px; }
  .balance-card { padding: 22px 20px; box-shadow: 0 2px 10px rgba(43,38,32,0.06); }
  .balance-label { font-size: 13px; color: #8a7f6e; margin-bottom: 4px; text-align: center; }
  .balance-value { font-size: 38px; font-weight: 700; text-align: center; margin-bottom: 18px; }
  .balance-value .unit { font-size: 16px; font-weight: 400; }
  .stats-row { display: flex; gap: 12px; }
  .stat-box { flex: 1; border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
  .stat-box.in { background: #eef4ee; }
  .stat-box.out { background: #f7ecec; }
  .stat-label-in { font-size: 12px; color: #5c6b5c; }
  .stat-label-out { font-size: 12px; color: #7d5c5c; }
  .stat-value-in { font-weight: 700; color: #2F5233; }
  .stat-value-out { font-weight: 700; color: #7A2E2E; }

  .type-toggle { display: flex; gap: 8px; margin-bottom: 12px; }
  .type-btn { flex: 1; padding: 10px 0; border-radius: 8px; font-weight: 700; cursor: pointer; background: #fff; border: 1px solid #DCD3C2; }
  .type-btn.in-active { border: 2px solid #2F5233; background: #eef4ee; color: #2F5233; }
  .type-btn.out-active { border: 2px solid #7A2E2E; background: #f7ecec; color: #7A2E2E; }
  .type-btn.in-inactive { color: #2F5233; }
  .type-btn.out-inactive { color: #7A2E2E; }

  input[type=text], input[type=number], select {
    width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid #DCD3C2;
    margin-bottom: 10px; font-size: 15px; background: #fff; color: #2B2620;
  }
  .row-2 { display: flex; gap: 8px; }
  .row-2 input { flex: 1; }
  .row-2 select { width: auto; }

  .btn-primary {
    width: 100%; padding: 12px 0; border-radius: 8px; border: none; background: #2B2620;
    color: #EFEAE0; font-weight: 700; font-size: 15px; display: flex; align-items: center;
    justify-content: center; gap: 6px; cursor: pointer;
  }
  .error-msg { color: #7A2E2E; font-size: 13px; margin-bottom: 8px; }
  .confirm-msg { color: #2F5233; font-size: 13px; margin-bottom: 8px; }
  .empty-msg { text-align: center; color: #a89d8c; padding: 30px 0; font-size: 14px; }
  .list-label { font-size: 13px; color: #8a7f6e; margin-bottom: 10px; padding-right: 4px; }

  .entry-row {
    background: #FBF8F2; border: 1px solid #DCD3C2; border-radius: 10px; padding: 12px 14px;
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 8px;
  }
  .entry-row.low { border: 1px solid #e8c98a; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.in { background: #2F5233; }
  .dot.out { background: #7A2E2E; }
  .entry-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .entry-desc { font-size: 14px; font-weight: 500; }
  .entry-date { font-size: 11px; color: #a89d8c; }
  .entry-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .amt-in { font-weight: 700; color: #2F5233; }
  .amt-out { font-weight: 700; color: #7A2E2E; }
  .icon-btn { background: none; border: none; cursor: pointer; color: #c2b8a8; padding: 4px; display: flex; }
  .qty-btn { border: none; border-radius: 6px; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .qty-btn.minus { background: #f7ecec; color: #7A2E2E; }
  .qty-btn.plus { background: #eef4ee; color: #2F5233; }
  .qty-value { min-width: 56px; text-align: center; font-weight: 700; }
  .qty-unit { font-size: 11px; font-weight: 400; }

  .low-banner {
    background: #fdf3e3; border: 1px solid #e8c98a; border-radius: 10px; padding: 10px 14px;
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px; font-size: 13px; color: #8a5a1a;
  }
  .loading { text-align: center; padding: 30px; color: #8a7f6e; }

  .table-wrap { overflow-x: auto; border: 1px solid #DCD3C2; border-radius: 10px; background: #FBF8F2; }
  .stock-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  .stock-table thead th {
    background: #e6ddc9; color: #4a4336; font-weight: 700; font-size: 12px;
    padding: 10px 8px; text-align: center; border-bottom: 1px solid #DCD3C2; white-space: nowrap;
  }
  .stock-table thead th.col-name { text-align: right; padding-right: 12px; }
  .stock-table tbody td {
    padding: 9px 8px; text-align: center; border-bottom: 1px solid #ece5d6; vertical-align: middle;
  }
  .stock-table tbody tr.alt { background: #f3eee2; }
  .stock-table tbody tr.low { background: #fdf3e3; }
  .stock-table tbody tr:last-child td { border-bottom: none; }
  .stock-table td.col-name { text-align: right; padding-right: 12px; font-weight: 500; white-space: nowrap; }
  .qty-cell { display: flex; align-items: center; justify-content: center; gap: 6px; }
  .qty-value-inline { min-width: 50px; display: inline-block; font-weight: 700; }
  .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; font-weight: 700; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .badge-low { background: #fbe4b8; color: #8a5a1a; }
  .badge-ok { background: #dcefe0; color: #2F5233; }
  .badge svg.icon { width: 12px; height: 12px; }

  svg.icon { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .emp-actions { display: flex; gap: 6px; justify-content: center; }
  .pay-btn {
    background: #2F5233; color: #fff; border: none; border-radius: 6px;
    padding: 6px 10px; font-size: 12px; font-weight: 700; cursor: pointer;
  }
</style>
</head>

    <h1 class="ledger-title">Wadina Resort</h1>
    <div class="subtitle">Revenue &amp; Payroll</div>
    <div class="rule"></div>
    <div id="userNameBar" style="font-size:11.5px;color:#8a7f6e;margin-top:8px;"></div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="revenue">🛏️ Room Revenue</button>
    <button class="tab-btn" data-tab="salaries">👥 Salaries</button>
    <button class="tab-btn" data-tab="profit">📊 Monthly Profit</button>
    <button class="tab-btn" data-tab="log">📋 Activity Log</button>
  </div>

  <div id="content">
    <div class="loading">Connecting to server...</div>
  </div>

</div>

<script>
/* ====================== FIREBASE CONFIG ======================
   Same Firebase project as the Ledger &amp; Stock app (different
   collections below so the data doesn't mix).
================================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyDFBLQqec2t6sqC79UkZGsEpM-_bKMjbFQ",
  authDomain: "wadina-resort.firebaseapp.com",
  projectId: "wadina-resort",
  storageBucket: "wadina-resort.firebasestorage.app",
  messagingSenderId: "515745479490",
  appId: "1:515745479490:web:f30ce459777c596a9166db"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const REVENUE_COL = "wadina_room_revenue";
const EMPLOYEES_COL = "wadina_employees";
const PAYMENTS_COL = "wadina_salary_payments";
const LOG_COL = "wadina_payroll_log";

/* ====================== DELETE CODE ======================
   Change this secret code to whatever you want. Only people who
   know this code will be able to delete revenue entries, employees,
   or salary payments.
============================================================= */
const DELETE_CODE = "2580";

function fmt(n) {
  return (Number(n) || 0).toFixed(3);
}

function toNum(str) {
  if (str == null) return NaN;
  return parseFloat(String(str).trim().replace(",", "."));
}

function getUserName() {
  return localStorage.getItem("wadina_user_name") || "";
}

function ensureUserName() {
  let name = getUserName();
  while (!name || !name.trim()) {
    name = window.prompt("Please enter your full name to continue:");
    if (name && name.trim()) {
      localStorage.setItem("wadina_user_name", name.trim());
    }
  }
  return name.trim();
}

async function logActivity(action, detail) {
  try {
    await db.collection(LOG_COL).add({
      name: getUserName() || "Unknown",
      action,
      detail,
      date: new Date().toISOString().slice(0, 10),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (e) {
    console.error("log activity error", e);
  }
}

async function confirmDeleteCode() {
  const code = window.prompt("Enter the delete code to confirm:");
  if (code === null) return false;
  if (code !== DELETE_CODE) {
    await logActivity("delete_denied", `${getUserName() || "Someone"} tried to delete with a wrong code`);
    window.alert("Wrong code. Deletion cancelled.");
    return false;
  }
  return true;
}

const icons = {
  plus: `<svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>`,
  trash: `<svg class="icon" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/></svg>`,
  warn: `<svg class="icon" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4m0 4h.01"/></svg>`
};

let currentTab = localStorage.getItem("wadina_payroll_tab") || "revenue";
let revenueEntries = [];
let employees = [];
let payments = [];
let activityLog = [];
let unsubscribers = [];

const contentEl = document.getElementById("content");

document.querySelectorAll(".tab-btn").forEach(btn => {
  if (btn.dataset.tab === currentTab) {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentTab = btn.dataset.tab;
    localStorage.setItem("wadina_payroll_tab", currentTab);
    render();
  });
});

/* ---------------------- Firestore listeners ---------------------- */

function listenRevenue() {
  return db.collection(REVENUE_COL).orderBy("createdAt", "desc").onSnapshot(snap => {
    revenueEntries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentTab === "revenue" || currentTab === "profit") render();
  }, err => console.error("revenue listen error", err));
}

function listenEmployees() {
  return db.collection(EMPLOYEES_COL).orderBy("createdAt", "desc").onSnapshot(snap => {
    employees = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentTab === "salaries") render();
  }, err => console.error("employees listen error", err));
}

function listenPayments() {
  return db.collection(PAYMENTS_COL).orderBy("createdAt", "desc").onSnapshot(snap => {
    payments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentTab === "salaries" || currentTab === "profit") render();
  }, err => console.error("payments listen error", err));
}

function listenLog() {
  return db.collection(LOG_COL).orderBy("createdAt", "desc").limit(200).onSnapshot(snap => {
    activityLog = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentTab === "log") render();
  }, err => console.error("log listen error", err));
}

/* ---------------------- CRUD ---------------------- */

async function addRevenueEntry(type, amount, desc) {
  await db.collection(REVENUE_COL).add({
    type, amount, desc,
    by: getUserName() || "Unknown",
    date: new Date().toISOString().slice(0, 10),
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  logActivity("add_revenue", `${getUserName()} added ${type === "in" ? "revenue" : "expense"} of ${fmt(amount)} RO (${desc})`);
}

async function removeRevenueEntry(id, desc) {
  if (!(await confirmDeleteCode())) return;
  await db.collection(REVENUE_COL).doc(id).delete();
  logActivity("delete_revenue", `${getUserName()} deleted entry: ${desc || id}`);
}

async function addEmployee(name, monthlySalary) {
  await db.collection(EMPLOYEES_COL).add({
    name, monthlySalary,
    by: getUserName() || "Unknown",
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  logActivity("add_employee", `${getUserName()} added employee: ${name} (${fmt(monthlySalary)} RO/month)`);
}

async function removeEmployee(id, name) {
  if (!(await confirmDeleteCode())) return;
  await db.collection(EMPLOYEES_COL).doc(id).delete();
  logActivity("delete_employee", `${getUserName()} deleted employee: ${name || id}`);
}

async function payEmployee(employeeId, employeeName, amount) {
  await db.collection(PAYMENTS_COL).add({
    employeeId, employeeName, amount,
    by: getUserName() || "Unknown",
    date: new Date().toISOString().slice(0, 10),
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  logActivity("pay_salary", `${getUserName()} paid ${employeeName} ${fmt(amount)} RO`);
}

async function removePayment(id, employeeName, amount) {
  if (!(await confirmDeleteCode())) return;
  await db.collection(PAYMENTS_COL).doc(id).delete();
  logActivity("delete_payment", `${getUserName()} deleted a payment of ${fmt(amount)} RO to ${employeeName}`);
}

/* ---------------------- Rendering ---------------------- */

function render() {
  if (currentTab === "revenue") renderRevenue();
  else if (currentTab === "salaries") renderSalaries();
  else if (currentTab === "profit") renderProfit();
  else renderLog();
}

function renderRevenue() {
  const income = revenueEntries.filter(e => e.type === "in").reduce((s, e) => s + e.amount, 0);
  const expense = revenueEntries.filter(e => e.type === "out").reduce((s, e) => s + e.amount, 0);
  const balance = income - expense;
  const balanceColor = balance > 0 ? "#2F5233" : balance < 0 ? "#7A2E2E" : "#2B2620";

  contentEl.innerHTML = `
    <div class="card balance-card">
      <div class="balance-label">Room Revenue Balance</div>
      <div class="balance-value" style="color:${balanceColor};margin-bottom:0;">${fmt(balance)} <span class="unit">RO</span></div>
    </div>

    <div class="card">
      <div class="type-toggle">
        <button class="type-btn in-inactive" id="typeInBtn">Revenue +</button>
        <button class="type-btn out-inactive" id="typeOutBtn">Expense -</button>
      </div>
      <input type="text" id="revAmount" placeholder="Amount (RO)" />
      <input type="text" id="revDesc" placeholder="Description (e.g. Room 12, 3 nights)" />
      <div id="revError"></div>
      <button class="btn-primary" id="revAddBtn">${icons.plus} Add Transaction</button>
    </div>

    <div class="list-label">Recent Transactions (${revenueEntries.length})</div>
    ${revenueEntries.length === 0 ? `<div class="empty-msg">No transactions yet. Add your first one above.</div>` : ""}
    <div id="revList"></div>
  `;

  let selectedType = "in";
  const typeInBtn = document.getElementById("typeInBtn");
  const typeOutBtn = document.getElementById("typeOutBtn");
  function updateToggle() {
    typeInBtn.className = "type-btn " + (selectedType === "in" ? "in-active" : "in-inactive");
    typeOutBtn.className = "type-btn " + (selectedType === "out" ? "out-active" : "out-inactive");
  }
  updateToggle();
  typeInBtn.onclick = () => { selectedType = "in"; updateToggle(); };
  typeOutBtn.onclick = () => { selectedType = "out"; updateToggle(); };

  document.getElementById("revAddBtn").onclick = async () => {
    const amountEl = document.getElementById("revAmount");
    const descEl = document.getElementById("revDesc");
    const errorEl = document.getElementById("revError");
    const val = toNum(amountEl.value);
    if (!val || val <= 0) {
      errorEl.innerHTML = `<div class="error-msg">Enter a valid number</div>`;
      return;
    }
    errorEl.innerHTML = "";
    await addRevenueEntry(selectedType, val, descEl.value.trim() || (selectedType === "in" ? "Room revenue" : "Expense"));
    amountEl.value = "";
    descEl.value = "";
  };

  const listEl = document.getElementById("revList");
  listEl.innerHTML = revenueEntries.map(e => `
    <div class="entry-row">
      <div class="entry-left">
        <div class="dot ${e.type}"></div>
        <div>
          <div class="entry-desc">${escapeHtml(e.desc)}</div>
          <div class="entry-date">${e.date || ""}${e.by ? " · " + escapeHtml(e.by) : ""}</div>
        </div>
      </div>
      <div class="entry-right">
        <div class="num ${e.type === 'in' ? 'amt-in' : 'amt-out'}">${e.type === 'in' ? '+' : '-'}${fmt(e.amount)}</div>
        <button class="icon-btn" data-remove="${e.id}">${icons.trash}</button>
      </div>
    </div>
  `).join("");
  listEl.querySelectorAll("[data-remove]").forEach(btn => {
    btn.onclick = () => {
      const entry = revenueEntries.find(e => e.id === btn.dataset.remove);
      removeRevenueEntry(btn.dataset.remove, entry ? entry.desc : "");
    };
  });
}

function renderSalaries() {
  const thisMonth = new Date().toISOString().slice(0, 7);

  contentEl.innerHTML = `
    <div class="card">
      <div class="list-label" style="margin-bottom:8px;">Add Employee</div>
      <input type="text" id="empName" placeholder="Employee full name" />
      <input type="text" id="empSalary" placeholder="Monthly salary (RO)" />
      <div id="empMsg"></div>
      <button class="btn-primary" id="empAddBtn">${icons.plus} Add Employee</button>
    </div>

    <div class="list-label">Employees (${employees.length})</div>
    ${employees.length === 0 ? `<div class="empty-msg">No employees yet. Add your first one above.</div>` : `
    <div class="table-wrap">
      <table class="stock-table">
        <thead>
          <tr>
            <th class="col-name">Name</th>
            <th>Monthly Salary</th>
            <th>Paid This Month</th>
            <th>Last Paid</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="empList"></tbody>
      </table>
    </div>`}

    <div class="list-label" style="margin-top:22px;">Payment History (${payments.length})</div>
    ${payments.length === 0 ? `<div class="empty-msg">No payments recorded yet.</div>` : `<div id="payList"></div>`}
  `;

  document.getElementById("empAddBtn").onclick = async () => {
    const nameEl = document.getElementById("empName");
    const salaryEl = document.getElementById("empSalary");
    const msgEl = document.getElementById("empMsg");
    if (!nameEl.value.trim()) {
      msgEl.innerHTML = `<div class="error-msg">Enter the employee's name</div>`;
      return;
    }
    const salary = toNum(salaryEl.value);
    if (!salaryEl.value || isNaN(salary) || salary <= 0) {
      msgEl.innerHTML = `<div class="error-msg">Enter a valid monthly salary</div>`;
      return;
    }
    msgEl.innerHTML = "";
    await addEmployee(nameEl.value.trim(), salary);
    nameEl.value = ""; salaryEl.value = "";
  };

  const empListEl = document.getElementById("empList");
  if (empListEl) {
    empListEl.innerHTML = employees.map((emp, idx) => {
      const empPayments = payments.filter(p => p.employeeId === emp.id);
      const paidThisMonth = empPayments
        .filter(p => (p.date || "").slice(0, 7) === thisMonth)
        .reduce((s, p) => s + p.amount, 0);
      const lastPaid = empPayments[0] ? empPayments[0].date : "—";
      return `
      <tr class="stock-row ${idx % 2 === 1 ? 'alt' : ''}">
        <td class="col-name">${escapeHtml(emp.name)}</td>
        <td class="num">${fmt(emp.monthlySalary)}</td>
        <td class="num" style="color:${paidThisMonth > 0 ? '#2F5233' : '#a89d8c'};font-weight:700;">${fmt(paidThisMonth)}</td>
        <td>${lastPaid}</td>
        <td>
          <div class="emp-actions">
            <button class="pay-btn" data-pay="${emp.id}" data-name="${escapeHtml(emp.name)}" data-salary="${emp.monthlySalary}">Pay</button>
            <button class="icon-btn" data-remove-emp="${emp.id}" data-emp-name="${escapeHtml(emp.name)}">${icons.trash}</button>
          </div>
        </td>
      </tr>`;
    }).join("");

    empListEl.querySelectorAll("[data-pay]").forEach(btn => {
      btn.onclick = async () => {
        const suggested = btn.dataset.salary;
        const input = window.prompt(`How much are you paying ${btn.dataset.name}? (RO)`, suggested);
        if (input === null) return;
        const amt = toNum(input);
        if (!amt || amt <= 0) {
          window.alert("Enter a valid amount.");
          return;
        }
        await payEmployee(btn.dataset.pay, btn.dataset.name, amt);
      };
    });
    empListEl.querySelectorAll("[data-remove-emp]").forEach(btn => {
      btn.onclick = () => removeEmployee(btn.dataset.removeEmp, btn.dataset.empName);
    });
  }

  const payListEl = document.getElementById("payList");
  if (payListEl) {
    payListEl.innerHTML = payments.slice(0, 50).map(p => `
      <div class="entry-row">
        <div class="entry-left">
          <div class="dot out"></div>
          <div>
            <div class="entry-desc">${escapeHtml(p.employeeName)}</div>
            <div class="entry-date">${p.date || ""}${p.by ? " · paid by " + escapeHtml(p.by) : ""}</div>
          </div>
        </div>
        <div class="entry-right">
          <div class="num amt-out">-${fmt(p.amount)}</div>
          <button class="icon-btn" data-remove-pay="${p.id}" data-pay-name="${escapeHtml(p.employeeName)}" data-pay-amt="${p.amount}">${icons.trash}</button>
        </div>
      </div>
    `).join("");
    payListEl.querySelectorAll("[data-remove-pay]").forEach(btn => {
      btn.onclick = () => removePayment(btn.dataset.removePay, btn.dataset.payName, parseFloat(btn.dataset.payAmt));
    });
  }
}

const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function renderProfit() {
  const groups = {};

  revenueEntries.forEach(e => {
    const key = (e.date || "").slice(0, 7);
    if (!key) return;
    if (!groups[key]) groups[key] = { revenue: 0, expense: 0, salaries: 0 };
    if (e.type === "in") groups[key].revenue += e.amount;
    else groups[key].expense += e.amount;
  });

  payments.forEach(p => {
    const key = (p.date || "").slice(0, 7);
    if (!key) return;
    if (!groups[key]) groups[key] = { revenue: 0, expense: 0, salaries: 0 };
    groups[key].salaries += p.amount;
  });

  const months = Object.keys(groups).sort().reverse();

  contentEl.innerHTML = `
    <div class="list-label">Monthly Profit</div>
    ${months.length === 0 ? `<div class="empty-msg">No data yet.</div>` : `
    <div class="table-wrap">
      <table class="stock-table">
        <thead>
          <tr>
            <th class="col-name">Month</th>
            <th>Revenue</th>
            <th>Expenses</th>
            <th>Salaries</th>
            <th>Net Profit</th>
          </tr>
        </thead>
        <tbody>
          ${months.map((key, idx) => {
            const g = groups[key];
            const [y, m] = key.split("-");
            const label = `${MONTH_NAMES[parseInt(m, 10) - 1]} ${y}`;
            const net = g.revenue - g.expense - g.salaries;
            const netColor = net > 0 ? "#2F5233" : net < 0 ? "#7A2E2E" : "#2B2620";
            return `
            <tr class="stock-row ${idx % 2 === 1 ? 'alt' : ''}">
              <td class="col-name">${label}</td>
              <td class="num" style="color:#2F5233;font-weight:700;">${fmt(g.revenue)}</td>
              <td class="num" style="color:#7A2E2E;font-weight:700;">${fmt(g.expense)}</td>
              <td class="num" style="color:#7A2E2E;font-weight:700;">${fmt(g.salaries)}</td>
              <td class="num" style="color:${netColor};font-weight:700;">${fmt(net)}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>`}
  `;
}

const ACTION_LABELS = {
  add_revenue: "➕ Added transaction",
  delete_revenue: "🗑️ Deleted transaction",
  add_employee: "👤 Added employee",
  delete_employee: "🗑️ Deleted employee",
  pay_salary: "💰 Paid salary",
  delete_payment: "🗑️ Deleted payment",
  delete_denied: "⚠️ Wrong delete code"
};

function renderLog() {
  contentEl.innerHTML = `
    <div class="list-label">Activity Log (${activityLog.length})</div>
    ${activityLog.length === 0 ? `<div class="empty-msg">No activity yet.</div>` : `<div id="logList"></div>`}
  `;
  const listEl = document.getElementById("logList");
  if (!listEl) return;
  listEl.innerHTML = activityLog.map(l => `
    <div class="entry-row">
      <div class="entry-left">
        <div class="dot ${l.action === 'delete_denied' ? 'out' : 'in'}"></div>
        <div>
          <div class="entry-desc">${escapeHtml(l.detail || ACTION_LABELS[l.action] || l.action)}</div>
          <div class="entry-date">${l.name ? escapeHtml(l.name) + " · " : ""}${l.date || ""}</div>
        </div>
      </div>
    </div>
  `).join("");
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str ?? "";
  return div.innerHTML;
}
