<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap');
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #F5F6F5;
    font-family: 'Inter', -apple-system, sans-serif;
    color: #182620;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 22px 16px 60px; }
  .num, .mono { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }
  input, select, button { font-family: 'Inter', sans-serif; }
  input::placeholder { color: #9aa39c; }

  /* ---------- Header ---------- */
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .logo { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
  .header-text h1 { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; margin: 0; letter-spacing: -0.2px; }
  .header-text .subtitle { font-size: 11.5px; color: #6b7770; letter-spacing: 0.3px; margin-top: 1px; }
  #userNameBar { font-size: 11px; color: #8a938c; margin-top: 8px; }
  #userNameBar a { color: #1F7A5C; }

  /* ---------- Hero balance ---------- */
  .hero {
    background: #14261E; color: #F5F6F5; border-radius: 18px; padding: 26px 24px 22px;
    margin-bottom: 14px; position: relative; overflow: hidden;
  }
  .hero::after {
    content: ""; position: absolute; top: -40%; right: -20%; width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(31,122,92,0.35) 0%, transparent 70%);
  }
  .hero-label { font-size: 11.5px; letter-spacing: 1.2px; text-transform: uppercase; color: #9fb3a8; margin-bottom: 6px; position: relative; }
  .hero-value { font-family: 'Fraunces', serif; font-size: 42px; font-weight: 600; letter-spacing: -0.5px; line-height: 1; position: relative; }
  .hero-value .unit { font-size: 16px; font-weight: 400; color: #9fb3a8; }
  .hero-delta { font-size: 12.5px; margin-top: 8px; position: relative; color: #7fd8ae; }
  .hero-delta.neg { color: #e5a3a3; }

  /* ---------- Stat row ---------- */
  .stat-row { display: flex; gap: 10px; margin-bottom: 18px; }
  .stat-box {
    flex: 1; background: #fff; border: 1px solid #e5e8e4; border-radius: 12px; padding: 12px 14px;
  }
  .stat-box .label { font-size: 10.5px; color: #7c857e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .stat-box .value { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; }
  .stat-box.rev .value { color: #1F7A5C; }
  .stat-box.exp .value { color: #B23A3A; }
  .stat-box.net .value { color: #14261E; }

  /* ---------- Mini bar chart ---------- */
  .chart-card { background: #fff; border: 1px solid #e5e8e4; border-radius: 14px; padding: 16px 16px 10px; margin-bottom: 20px; }
  .chart-title { font-size: 12px; font-weight: 600; color: #40483f; margin-bottom: 12px; }
  .chart-row { display: flex; align-items: flex-end; gap: 10px; height: 110px; }
  .chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
  .chart-bars { display: flex; align-items: flex-end; gap: 3px; height: 90px; width: 100%; justify-content: center; }
  .bar { width: 8px; border-radius: 3px 3px 0 0; min-height: 2px; }
  .bar.rev { background: #1F7A5C; }
  .bar.exp { background: #B23A3A; }
  .chart-col .m-label { font-size: 9.5px; color: #8a938c; margin-top: 6px; }

  /* ---------- Tabs ---------- */
  .tabs { display: flex; flex-wrap: wrap; gap: 5px; background: #e9ebe8; padding: 5px; border-radius: 11px; margin-bottom: 18px; }
  .tab-btn {
    flex: 1 1 30%; min-width: 96px; display: flex; align-items: center; justify-content: center; gap: 5px;
    padding: 9px 4px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 12px; font-weight: 600; background: transparent; color: #5c655e;
    transition: all 0.15s ease;
  }
  .tab-btn.active { background: #14261E; color: #fff; }

  /* ---------- Cards / forms ---------- */
  .card { background: #fff; border: 1px solid #e5e8e4; border-radius: 14px; padding: 16px; margin-bottom: 18px; }
  input[type=text], select {
    width: 100%; padding: 11px 13px; border-radius: 9px; border: 1px solid #dde1db;
    margin-bottom: 9px; font-size: 14.5px; background: #fbfcfb; color: #182620;
  }
  .btn-primary {
    width: 100%; padding: 12px 0; border-radius: 9px; border: none; background: #14261E;
    color: #fff; font-weight: 600; font-size: 14.5px; display: flex; align-items: center;
    justify-content: center; gap: 6px; cursor: pointer;
  }
  .error-msg { color: #B23A3A; font-size: 12.5px; margin-bottom: 8px; }
  .confirm-msg { color: #1F7A5C; font-size: 12.5px; margin-bottom: 8px; }
  .empty-msg { text-align: center; color: #9aa39c; padding: 26px 0; font-size: 13.5px; }
  .list-label { font-size: 12px; font-weight: 600; color: #5c655e; margin-bottom: 9px; padding: 0 2px; text-transform: uppercase; letter-spacing: 0.4px; }

  /* ---------- Entry rows ---------- */
  .entry-row {
    background: #fff; border: 1px solid #e5e8e4; border-radius: 11px; padding: 12px 14px;
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; gap: 8px;
  }
  .entry-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .entry-desc { font-size: 13.5px; font-weight: 500; }
  .entry-date { font-size: 10.5px; color: #9aa39c; margin-top: 1px; }
  .entry-right { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
  .amt-in { font-weight: 700; color: #1F7A5C; }
  .amt-out { font-weight: 700; color: #B23A3A; }
  .icon-btn { background: none; border: none; cursor: pointer; color: #c2c9bf; padding: 4px; display: flex; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot.in { background: #1F7A5C; }
  .dot.out { background: #B23A3A; }

  .chip {
    display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 20px; margin-left: 5px; white-space: nowrap;
  }
  .chip-cash { background: #eaf3ee; color: #1F7A5C; }
  .chip-visa { background: #e8eefb; color: #2953a6; }
  .chip-mc { background: #fdeee6; color: #b5581f; }
  .chip-cat { background: #f5e9e9; color: #B23A3A; }

  /* ---------- Table ---------- */
  .table-wrap { overflow-x: auto; border: 1px solid #e5e8e4; border-radius: 12px; background: #fff; }
  .fin-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .fin-table thead th {
    background: #f2f4f1; color: #495047; font-weight: 700; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.3px;
    padding: 10px 8px; text-align: center; border-bottom: 1px solid #e5e8e4; white-space: nowrap;
  }
  .fin-table thead th.col-name { text-align: left; padding-left: 12px; }
  .fin-table tbody td { padding: 9px 8px; text-align: center; border-bottom: 1px solid #f0f2ef; vertical-align: middle; }
  .fin-table tbody tr.alt { background: #fafbfa; }
  .fin-table tbody tr:last-child td { border-bottom: none; }
  .fin-table td.col-name { text-align: left; padding-left: 12px; font-weight: 500; white-space: nowrap; }
  .cat-bar-row { display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; padding: 6px 0; }
  .cat-bar-track { flex: 1; height: 5px; background: #eef0ed; border-radius: 3px; margin: 0 10px; overflow: hidden; }
  .cat-bar-fill { height: 100%; background: #B23A3A; border-radius: 3px; }

  .pay-btn {
    background: #14261E; color: #fff; border: none; border-radius: 7px;
    padding: 6px 11px; font-size: 11.5px; font-weight: 700; cursor: pointer;
  }
  .emp-actions { display: flex; gap: 6px; justify-content: center; }
  .owed { color: #B23A3A; font-weight: 700; }
  .owed.zero { color: #9aa39c; font-weight: 500; }

  .loading { text-align: center; padding: 30px; color: #9aa39c; }
  svg.icon { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>

db.enablePersistence({ synchronizeTabs: true }).catch((err) => {

const REVENUE_COL = "wadina_profit_revenue";
const EXPENSES_COL = "wadina_profit_expenses";

const LOG_COL = "wadina_profit_log";

const EXPENSE_CATEGORIES = [

];

/* ====================== DELETE CODE ======================
   Change this secret code to whatever you want. Only people who
   know this code will be able to delete entries.
============================================================= */
const DELETE_CODE = "2580";

function fmt(n) {
  return (Number(n) || 0).toFixed(3);
}

function toNum(str) {
  if (str == null) return NaN;
  return parseFloat(String(str).trim().replace(",", "."));
}

function getUserName() {
  return localStorage.getItem("wadina_user_name") || "";
}

function ensureUserName() {
  let name = getUserName();
  while (!name || !name.trim()) {
    name = window.prompt("Please enter your full name to continue:");
    if (name && name.trim()) {
      localStorage.setItem("wadina_user_name", name.trim());
    }
  }
  return name.trim();
}

async function logActivity(action, detail) {
  try {
    await db.collection(LOG_COL).add({
      name: getUserName() || "Unknown",
      action, detail,
      date: new Date().toISOString().slice(0, 10),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (e) { console.error("log activity error", e); }
}

async function confirmDeleteCode() {
  const code = window.prompt("Enter the delete code to confirm:");
  if (code === null) return false;
  if (code !== DELETE_CODE) {
    await logActivity("delete_denied", `${getUserName() || "Someone"} tried to delete with a wrong code`);
    window.alert("Wrong code. Deletion cancelled.");
    return false;
  }
  return true;
}

const icons = {

};

let currentTab = localStorage.getItem("wadina_profit_tab") || "dashboard";

let employees = [];
let payments = [];
let activityLog = [];
let unsubscribers = [];

const contentEl = document.getElementById("content");

document.querySelectorAll(".tab-btn").forEach(btn => {

    btn.classList.add("active");
  }
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));

    currentTab = btn.dataset.tab;
    localStorage.setItem("wadina_profit_tab", currentTab);
    render();

});

/* ---------------------- Firestore listeners ---------------------- */

function listenRevenue() {
  return db.collection(REVENUE_COL).orderBy("createdAt", "desc").onSnapshot(snap => {
    revenueEntries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  }, err => console.error("revenue listen error", err));
}
function listenExpenses() {
  return db.collection(EXPENSES_COL).orderBy("createdAt", "desc").onSnapshot(snap => {
    expenseEntries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  }, err => console.error("expenses listen error", err));
}
function listenEmployees() {
  return db.collection(EMPLOYEES_COL).orderBy("createdAt", "desc").onSnapshot(snap => {
    employees = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentTab === "salaries") render();
  }, err => console.error("employees listen error", err));
}
function listenPayments() {
  return db.collection(PAYMENTS_COL).orderBy("createdAt", "desc").onSnapshot(snap => {
    payments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  }, err => console.error("payments listen error", err));
}
function listenLog() {
  return db.collection(LOG_COL).orderBy("createdAt", "desc").limit(200).onSnapshot(snap => {
    activityLog = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentTab === "log") render();
  }, err => console.error("log listen error", err));
}

/* ---------------------- CRUD ---------------------- */

/* ---------------------- Helpers ---------------------- */

function monthKey(dateStr) { return (dateStr || "").slice(0, 7); }
const MONTH_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function monthlyGroups() {
  const groups = {};
  revenueEntries.forEach(e => {
    const k = monthKey(e.date); if (!k) return;
    groups[k] = groups[k] || { revenue: 0, expense: 0, salaries: 0 };
    groups[k].revenue += e.amount;
  });
  expenseEntries.forEach(e => {
    const k = monthKey(e.date); if (!k) return;
    groups[k] = groups[k] || { revenue: 0, expense: 0, salaries: 0 };
    groups[k].expense += e.amount;
  });
  payments.forEach(p => {
    const k = monthKey(p.date); if (!k) return;
    groups[k] = groups[k] || { revenue: 0, expense: 0, salaries: 0 };
    groups[k].salaries += p.amount;
  });
  return groups;
}

/* ---------------------- Rendering ---------------------- */

function render() {
  if (currentTab === "dashboard") renderDashboard();
  else if (currentTab === "revenue") renderRevenue();
  else if (currentTab === "expenses") renderExpenses();
  else if (currentTab === "salaries") renderSalaries();
  else if (currentTab === "report") renderReport();
  else renderLog();
}

function renderDashboard() {
  const totalRevenue = revenueEntries.reduce((s, e) => s + e.amount, 0);
  const totalExpense = expenseEntries.reduce((s, e) => s + e.amount, 0);
  const totalSalaries = payments.reduce((s, p) => s + p.amount, 0);
  const balance = totalRevenue - totalExpense - totalSalaries;

  const thisMonth = new Date().toISOString().slice(0, 7);
  const groups = monthlyGroups();
  const thisG = groups[thisMonth] || { revenue: 0, expense: 0, salaries: 0 };
  const thisNet = thisG.revenue - thisG.expense - thisG.salaries;

  // last 6 months for the chart
  const now = new Date();
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(d.toISOString().slice(0, 7));
  }
  const maxVal = Math.max(1, ...months.map(k => Math.max((groups[k]||{}).revenue||0, (groups[k]||{}).expense||0)));

  contentEl.innerHTML = `
    <div class="hero">
      <div class="hero-label">Resort Balance (all time)</div>
      <div class="hero-value">${fmt(balance)} <span class="unit">RO</span></div>
      <div class="hero-delta ${thisNet < 0 ? 'neg' : ''}">${thisNet >= 0 ? '▲' : '▼'} ${fmt(Math.abs(thisNet))} RO net this month</div>
    </div>

    <div class="stat-row">
      <div class="stat-box rev"><div class="label">Revenue (mo.)</div><div class="value">${fmt(thisG.revenue)}</div></div>
      <div class="stat-box exp"><div class="label">Expenses (mo.)</div><div class="value">${fmt(thisG.expense + thisG.salaries)}</div></div>
      <div class="stat-box net"><div class="label">Net (mo.)</div><div class="value">${fmt(thisNet)}</div></div>
    </div>

    <div class="chart-card">
      <div class="chart-title">Revenue vs. Expenses — last 6 months</div>
      <div class="chart-row">
        ${months.map(k => {
          const g = groups[k] || { revenue: 0, expense: 0 };
          const revH = Math.max(2, (g.revenue / maxVal) * 90);
          const expH = Math.max(2, (g.expense / maxVal) * 90);
          const [y, m] = k.split("-");
          return `
          <div class="chart-col">
            <div class="chart-bars">
              <div class="bar rev" style="height:${revH}px;"></div>
              <div class="bar exp" style="height:${expH}px;"></div>
            </div>
            <div class="m-label">${MONTH_SHORT[parseInt(m,10)-1]}</div>
          </div>`;
        }).join("")}
      </div>
    </div>
  `;
}

function renderRevenue() {
  const total = revenueEntries.reduce((s, e) => s + e.amount, 0);
  const byMethod = {};
  revenueEntries.forEach(e => { byMethod[e.method] = (byMethod[e.method]||0) + e.amount; });

  contentEl.innerHTML = `
    <div class="hero">
      <div class="hero-label">Total Room Revenue</div>
      <div class="hero-value">${fmt(total)} <span class="unit">RO</span></div>
    </div>

    <div class="stat-row">
      ${PAYMENT_METHODS.map(m => `
        <div class="stat-box"><div class="label">${m}</div><div class="value">${fmt(byMethod[m]||0)}</div></div>
      `).join("")}
    </div>

    <div class="card">
      <input type="text" id="revAmount" placeholder="Amount (RO)" />
      <input type="text" id="revDesc" placeholder="Description (e.g. Room 12, 3 nights)" />
      <select id="revMethod">
        ${PAYMENT_METHODS.map(m => `<option value="${m}">${m}</option>`).join("")}
      </select>
      <div id="revError"></div>
      <button class="btn-primary" id="revAddBtn">${icons.plus} Add Revenue</button>
    </div>

    <div class="list-label">Recent Transactions (${revenueEntries.length})</div>
    ${revenueEntries.length === 0 ? `<div class="empty-msg">No transactions yet.</div>` : ""}
    <div id="revList"></div>
  `;

  document.getElementById("revAddBtn").onclick = async () => {
    const amountEl = document.getElementById("revAmount");
    const descEl = document.getElementById("revDesc");
    const methodEl = document.getElementById("revMethod");
    const errorEl = document.getElementById("revError");
    const val = toNum(amountEl.value);
    if (!val || val <= 0) { errorEl.innerHTML = `<div class="error-msg">Enter a valid number</div>`; return; }
    errorEl.innerHTML = "";
    await addRevenueEntry(val, descEl.value.trim() || "Room revenue", methodEl.value);
    amountEl.value = ""; descEl.value = "";
  };

  const chipClass = { Cash: "chip-cash", Visa: "chip-visa", Mastercard: "chip-mc" };
  const listEl = document.getElementById("revList");
  listEl.innerHTML = revenueEntries.map(e => `
    <div class="entry-row">
      <div class="entry-left">
        <div class="dot in"></div>
        <div>
          <div class="entry-desc">${escapeHtml(e.desc)}<span class="chip ${chipClass[e.method]||'chip-cash'}">${e.method||'Cash'}</span></div>
          <div class="entry-date">${e.date || ""}${e.by ? " · " + escapeHtml(e.by) : ""}</div>
        </div>
      </div>
      <div class="entry-right">
        <div class="num amt-in">+${fmt(e.amount)}</div>
        <button class="icon-btn" data-remove="${e.id}">${icons.trash}</button>
      </div>
    </div>
  `).join("");
  listEl.querySelectorAll("[data-remove]").forEach(btn => {
    btn.onclick = () => {
      const entry = revenueEntries.find(e => e.id === btn.dataset.remove);
      removeRevenueEntry(btn.dataset.remove, entry ? entry.desc : "");
    };
  });
}

function renderExpenses() {
  const total = expenseEntries.reduce((s, e) => s + e.amount, 0);
  const byCategory = {};
  expenseEntries.forEach(e => { byCategory[e.category] = (byCategory[e.category]||0) + e.amount; });
  const categoryRows = Object.entries(byCategory).sort((a,b) => b[1]-a[1]);
  const maxCat = Math.max(1, ...categoryRows.map(r => r[1]));

  contentEl.innerHTML = `
    <div class="hero" style="background:#3B1F1F;">
      <div class="hero-label">Total Expenses</div>
      <div class="hero-value">${fmt(total)} <span class="unit">RO</span></div>
    </div>

    ${categoryRows.length > 0 ? `
    <div class="card">
      <div class="list-label">By Category</div>
      ${categoryRows.map(([cat, amt]) => `
        <div class="cat-bar-row">
          <span style="width:120px;">${escapeHtml(cat)}</span>
          <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${(amt/maxCat)*100}%;"></div></div>
          <span class="num" style="font-weight:700;">${fmt(amt)}</span>
        </div>
      `).join("")}
    </div>` : ""}

    <div class="card">
      <select id="expCategory">
        ${EXPENSE_CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join("")}
      </select>
      <input type="text" id="expAmount" placeholder="Amount (RO)" />
      <input type="text" id="expDesc" placeholder="Description (e.g. electricity bill)" />
      <div id="expError"></div>
      <button class="btn-primary" id="expAddBtn" style="background:#7A2E2E;">${icons.plus} Add Expense</button>
    </div>

    <div class="list-label">Recent Expenses (${expenseEntries.length})</div>
    ${expenseEntries.length === 0 ? `<div class="empty-msg">No expenses yet.</div>` : ""}
    <div id="expList"></div>
  `;

  document.getElementById("expAddBtn").onclick = async () => {
    const catEl = document.getElementById("expCategory");
    const amountEl = document.getElementById("expAmount");
    const descEl = document.getElementById("expDesc");
    const errorEl = document.getElementById("expError");
    const val = toNum(amountEl.value);
    if (!val || val <= 0) { errorEl.innerHTML = `<div class="error-msg">Enter a valid number</div>`; return; }
    errorEl.innerHTML = "";
    await addExpense(catEl.value, val, descEl.value.trim() || catEl.value);
    amountEl.value = ""; descEl.value = "";
  };

  const listEl = document.getElementById("expList");
  listEl.innerHTML = expenseEntries.map(e => `
    <div class="entry-row">
      <div class="entry-left">
        <div class="dot out"></div>
        <div>
          <div class="entry-desc">${escapeHtml(e.desc)}<span class="chip chip-cat">${escapeHtml(e.category)}</span></div>
          <div class="entry-date">${e.date || ""}${e.by ? " · " + escapeHtml(e.by) : ""}</div>
        </div>
      </div>
      <div class="entry-right">
        <div class="num amt-out">-${fmt(e.amount)}</div>
        <button class="icon-btn" data-remove="${e.id}">${icons.trash}</button>
      </div>
    </div>
  `).join("");
  listEl.querySelectorAll("[data-remove]").forEach(btn => {
    btn.onclick = () => {
      const entry = expenseEntries.find(e => e.id === btn.dataset.remove);
      removeExpense(btn.dataset.remove, entry ? entry.desc : "");
    };
  });
}

function renderSalaries() {
  const thisMonth = new Date().toISOString().slice(0, 7);

  contentEl.innerHTML = `
    <div class="card">
      <div class="list-label">Add Employee</div>
      <input type="text" id="empName" placeholder="Employee full name" />
      <input type="text" id="empSalary" placeholder="Monthly salary (RO)" />
      <div id="empMsg"></div>
      <button class="btn-primary" id="empAddBtn">${icons.plus} Add Employee</button>
    </div>

    <div class="list-label">Employees (${employees.length})</div>
    ${employees.length === 0 ? `<div class="empty-msg">No employees yet.</div>` : `
    <div class="table-wrap">
      <table class="fin-table">
        <thead>
          <tr>
            <th class="col-name">Name</th>
            <th>Salary</th>
            <th>Paid</th>
            <th>Owed</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="empList"></tbody>
      </table>
    </div>`}

    <div class="list-label" style="margin-top:20px;">Payment History (${payments.length})</div>
    ${payments.length === 0 ? `<div class="empty-msg">No payments recorded yet.</div>` : `<div id="payList"></div>`}
  `;

  document.getElementById("empAddBtn").onclick = async () => {
    const nameEl = document.getElementById("empName");
    const salaryEl = document.getElementById("empSalary");
    const msgEl = document.getElementById("empMsg");
    if (!nameEl.value.trim()) { msgEl.innerHTML = `<div class="error-msg">Enter the employee's name</div>`; return; }
    const salary = toNum(salaryEl.value);
    if (!salaryEl.value || isNaN(salary) || salary <= 0) { msgEl.innerHTML = `<div class="error-msg">Enter a valid monthly salary</div>`; return; }
    msgEl.innerHTML = "";
    await addEmployee(nameEl.value.trim(), salary);
    nameEl.value = ""; salaryEl.value = "";
  };

  const empListEl = document.getElementById("empList");
  if (empListEl) {
    empListEl.innerHTML = employees.map((emp, idx) => {
      const empPayments = payments.filter(p => p.employeeId === emp.id);
      const paidThisMonth = empPayments.filter(p => monthKey(p.date) === thisMonth).reduce((s,p)=>s+p.amount,0);
      const owed = Math.max(0, emp.monthlySalary - paidThisMonth);
      return `
      <tr class="${idx % 2 === 1 ? 'alt' : ''}">
        <td class="col-name">${escapeHtml(emp.name)}</td>
        <td class="num">${fmt(emp.monthlySalary)}</td>
        <td class="num" style="color:#1F7A5C;font-weight:700;">${fmt(paidThisMonth)}</td>
        <td class="num owed ${owed === 0 ? 'zero' : ''}">${fmt(owed)}</td>
        <td>
          <div class="emp-actions">
            <button class="pay-btn" data-pay="${emp.id}" data-name="${escapeHtml(emp.name)}" data-owed="${owed}">Pay</button>
            <button class="icon-btn" data-remove-emp="${emp.id}" data-emp-name="${escapeHtml(emp.name)}">${icons.trash}</button>
          </div>
        </td>
      </tr>`;
    }).join("");

    empListEl.querySelectorAll("[data-pay]").forEach(btn => {
      btn.onclick = async () => {
        const suggested = btn.dataset.owed;
        const input = window.prompt(`How much are you paying ${btn.dataset.name}? (RO)`, suggested);
        if (input === null) return;
        const amt = toNum(input);
        if (!amt || amt <= 0) { window.alert("Enter a valid amount."); return; }
        await payEmployee(btn.dataset.pay, btn.dataset.name, amt);
      };
    });
    empListEl.querySelectorAll("[data-remove-emp]").forEach(btn => {
      btn.onclick = () => removeEmployee(btn.dataset.removeEmp, btn.dataset.empName);
    });
  }

  const payListEl = document.getElementById("payList");
  if (payListEl) {
    payListEl.innerHTML = payments.slice(0, 50).map(p => `
      <div class="entry-row">
        <div class="entry-left">
          <div class="dot out"></div>
          <div>
            <div class="entry-desc">${escapeHtml(p.employeeName)}</div>
            <div class="entry-date">${p.date || ""}${p.by ? " · paid by " + escapeHtml(p.by) : ""}</div>
          </div>
        </div>
        <div class="entry-right">
          <div class="num amt-out">-${fmt(p.amount)}</div>
          <button class="icon-btn" data-remove-pay="${p.id}" data-pay-name="${escapeHtml(p.employeeName)}" data-pay-amt="${p.amount}">${icons.trash}</button>
        </div>
      </div>
    `).join("");
    payListEl.querySelectorAll("[data-remove-pay]").forEach(btn => {
      btn.onclick = () => removePayment(btn.dataset.removePay, btn.dataset.payName, parseFloat(btn.dataset.payAmt));
    });
  }
}

function renderReport() {
  const groups = monthlyGroups();
  const months = Object.keys(groups).sort().reverse();

  contentEl.innerHTML = `
    <div class="list-label">Monthly Report</div>
    ${months.length === 0 ? `<div class="empty-msg">No data yet.</div>` : `
    <div class="table-wrap">
      <table class="fin-table">
        <thead>
          <tr>
            <th class="col-name">Month</th>
            <th>Revenue</th>
            <th>Expenses</th>
            <th>Salaries</th>
            <th>Net</th>
          </tr>
        </thead>
        <tbody>
          ${months.map((key, idx) => {
            const g = groups[key];
            const [y, m] = key.split("-");
            const label = `${MONTH_NAMES[parseInt(m, 10) - 1]} ${y}`;
            const net = g.revenue - g.expense - g.salaries;
            const netColor = net > 0 ? "#1F7A5C" : net < 0 ? "#B23A3A" : "#14261E";
            return `
            <tr class="${idx % 2 === 1 ? 'alt' : ''}">
              <td class="col-name">${label}</td>
              <td class="num" style="color:#1F7A5C;font-weight:700;">${fmt(g.revenue)}</td>
              <td class="num" style="color:#B23A3A;font-weight:700;">${fmt(g.expense)}</td>
              <td class="num" style="color:#B23A3A;font-weight:700;">${fmt(g.salaries)}</td>
              <td class="num" style="color:${netColor};font-weight:700;">${fmt(net)}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>`}
  `;
}

const ACTION_LABELS = {
  add_revenue: "➕ Added revenue", delete_revenue: "🗑️ Deleted revenue entry",
  add_expense: "💸 Added expense", delete_expense: "🗑️ Deleted expense",
  add_employee: "👤 Added employee", delete_employee: "🗑️ Deleted employee",
  pay_salary: "💰 Paid salary", delete_payment: "🗑️ Deleted payment",
  delete_denied: "⚠️ Wrong delete code"
};

function renderLog() {
  contentEl.innerHTML = `
    <div class="list-label">Activity Log (${activityLog.length})</div>
    ${activityLog.length === 0 ? `<div class="empty-msg">No activity yet.</div>` : `<div id="logList"></div>`}
  `;
  const listEl = document.getElementById("logList");
  if (!listEl) return;
  listEl.innerHTML = activityLog.map(l => `
    <div class="entry-row">
      <div class="entry-left">
        <div class="dot ${l.action === 'delete_denied' ? 'out' : 'in'}"></div>
        <div>
          <div class="entry-desc">${escapeHtml(l.detail || ACTION_LABELS[l.action] || l.action)}</div>
          <div class="entry-date">${l.name ? escapeHtml(l.name) + " · " : ""}${l.date || ""}</div>
        </div>
      </div>
    </div>
  `).join("");
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str ?? "";
  return div.innerHTML;
}

/* ---------------------- Init ---------------------- */

ensureUserName();

function updateUserNameBar() {
  const bar = document.getElementById("userNameBar");
  if (bar) {
    bar.innerHTML = `Signed in as <b>${escapeHtml(getUserName())}</b> · <a href="#" id="changeNameLink">not you?</a>`;
    const link = document.getElementById("changeNameLink");
    if (link) {
      link.onclick = (e) => {
        e.preventDefault();
        localStorage.removeItem("wadina_user_name");
        ensureUserName();
        updateUserNameBar();
      };
    }
  }
}
updateUserNameBar();

unsubscribers.push(listenRevenue());
unsubscribers.push(listenExpenses());
unsubscribers.push(listenEmployees());
unsubscribers.push(listenPayments());
unsubscribers.push(listenLog());
</script>
